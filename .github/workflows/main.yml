name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Lint Codebase
      run: npm run lint

    - name: Build Frontend
      run: npm run build
