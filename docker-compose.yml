version: '3.8'

services:
  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SERVICE_NAME=api-gateway
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - ENABLE_REDIS=true
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - MESSAGING_SERVICE_URL=http://messaging-service:5003
      - CONTENT_SERVICE_URL=http://content-service:5004
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
      - auth-service
      - user-service
      - messaging-service
      - content-service
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auth Microservice
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - AUTH_SERVICE_PORT=5001
      - SERVICE_NAME=auth-service
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - ENABLE_REDIS=true
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Microservice
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - USER_SERVICE_PORT=5002
      - SERVICE_NAME=user-service
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - ENABLE_REDIS=true
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Messaging Microservice
  messaging-service:
    build:
      context: .
      dockerfile: services/messaging-service/Dockerfile
    ports:
      - "5003:5003"
    environment:
      - MESSAGING_SERVICE_PORT=5003
      - SERVICE_NAME=messaging-service
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - ENABLE_REDIS=true
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Content Microservice
  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    ports:
      - "5004:5004"
    environment:
      - CONTENT_SERVICE_PORT=5004
      - SERVICE_NAME=content-service
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - ENABLE_REDIS=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5004/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache (Primary)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Secondary/Mirror) - For testing scale/sync
  redis-secondary:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: vibestream-network
